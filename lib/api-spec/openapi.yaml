openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analytics
    description: Analytics operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary
      description: Returns aggregated analytics for the last 30 days
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"
  /analytics/daily:
    get:
      operationId: getAnalyticsDaily
      tags: [analytics]
      summary: Get daily page views
      description: Returns daily page view counts for the last 30 days
      responses:
        "200":
          description: Daily views array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyView"
  /analytics/clicks:
    get:
      operationId: getAnalyticsTopClicks
      tags: [analytics]
      summary: Get top click events
      description: Returns top clicked elements in the last 30 days
      responses:
        "200":
          description: Top clicks array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopClick"
  /analytics/sessions/recent:
    get:
      operationId: getRecentSessions
      tags: [analytics]
      summary: Get recent sessions
      description: Returns the 50 most recent sessions
      responses:
        "200":
          description: Recent sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionRow"
  /feedback:
    post:
      operationId: submitFeedback
      tags: [analytics]
      summary: Submit feedback
      description: Saves a visitor's feedback message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "200":
          description: Feedback saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackItem"
    get:
      operationId: getFeedback
      tags: [analytics]
      summary: Get all feedback
      description: Returns all feedback messages newest first
      responses:
        "200":
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackItem"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyticsSummary:
      type: object
      properties:
        totalSessions:
          type: integer
        totalPageViews:
          type: integer
        totalClicks:
          type: integer
        bounceRate:
          type: integer
        avgDurationSeconds:
          type: integer
      required:
        - totalSessions
        - totalPageViews
        - totalClicks
        - bounceRate
        - avgDurationSeconds
    DailyView:
      type: object
      properties:
        date:
          type: string
        views:
          type: integer
      required:
        - date
        - views
    TopClick:
      type: object
      properties:
        element:
          type: string
        label:
          type: string
          nullable: true
        count:
          type: integer
      required:
        - element
        - count
    SessionRow:
      type: object
      properties:
        id:
          type: string
        firstSeenAt:
          type: string
        lastSeenAt:
          type: string
        pageViewCount:
          type: integer
        bounced:
          type: integer
        duration:
          type: integer
        referrer:
          type: string
          nullable: true
      required:
        - id
        - firstSeenAt
        - lastSeenAt
        - pageViewCount
        - bounced
        - duration
    FeedbackInput:
      type: object
      properties:
        sessionId:
          type: string
          nullable: true
        message:
          type: string
      required:
        - message
    FeedbackItem:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
          nullable: true
        message:
          type: string
        createdAt:
          type: string
      required:
        - id
        - message
        - createdAt
