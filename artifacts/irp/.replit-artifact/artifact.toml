kind = "web"
previewPath = "/"
title = "IRP 2.0 – Internship Readiness Path"
version = "1.0.0"
id = "artifacts/irp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24079

[services.development]
run = "pnpm --filter @workspace/irp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/irp", "run", "build" ]
publicDir = "artifacts/irp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24079"
BASE_PATH = "/"
